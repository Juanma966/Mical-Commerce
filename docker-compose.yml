services:
  postgres:
    image: postgres:16-alpine
    container_name: mical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mical}
      POSTGRES_USER: ${POSTGRES_USER:-mical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mical_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - mical-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mical} -d ${POSTGRES_DB:-mical}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mical-pgdata:
